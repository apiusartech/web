<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: transparent;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
      z-index: 9999;
    }

    .banner {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: slideUp 0.4s ease;
    }

    .icon {
      width: 70px;
      height: 70px;
      background: #e6f9f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      stroke: #22c55e;
    }

    h2 {
      font-size: 1.5rem;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn {
      display: inline-block;
      background: #22c55e;
      color: #fff;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #16a34a; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay">
    <div class="banner">
      <div class="icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
        </svg>
      </div>
      <h2>Message Sent!</h2>
      <p>Thank you for reaching out. Our team will get back to you within 24 hours.</p>
      <button class="btn" onclick="goBack()">Back to Website</button>
    </div>
  </div>

  <script>
    // Auto redirect after 6 seconds
    let timer = setTimeout(goBack, 6000);

    function goBack() {
      clearTimeout(timer);
      // Replace with your actual contact page URL
      window.location.href = 'https://apiusartech.github.io/web/contact.html';
    }
  </script>

</body>
</html>
